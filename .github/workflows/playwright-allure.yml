name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npm run test:chromium
      continue-on-error: true

    - name: Generate Allure Report
      if: always()
      run: npm run allure:generate

    - name: Generate PDF Report
      if: always()
      run: node generate-pdf.js
      continue-on-error: true

    - name: Package Allure Report (ZIP)
      if: always()
      run: node package-report.js

    - name: Upload Allure Report (HTML)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-html
        path: allure-report/
        retention-days: 30

    - name: Upload Allure Report (PDF)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-pdf
        path: allure-report/allure-report-*.pdf
        retention-days: 30

    - name: Upload Allure Report (ZIP Package)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-package
        path: allure-report-*.zip
        retention-days: 30

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Screenshots & Videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: test-results/
        retention-days: 30

    - name: Deploy Allure Report to GitHub Pages
      if: always() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: allure-report
        keep_files: false

